<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD SPORTS TV 24 LIVE - Free Sports Streaming</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--primary:#f31246;
--bg:#f2f2f2;
--white:#ffffff;
--text:#333;
}

/* ===== Reset ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Open Sans',sans-serif;
}

body{
background:linear-gradient(-45deg,#ff004c,#0f2027,#203a43,#2c5364);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
color:var(--text);
line-height:1.6;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ===== Header ===== */

header{
background:var(--white);
padding:40px 0;
text-align:center;
border-bottom:4px solid var(--primary);
}

.site-title{
font-size:45px;
font-family:'Roboto',sans-serif;
font-weight:700;
color:#111;
text-transform:uppercase;
}

header p{
margin-top:10px;
}

/* ===== Navigation ===== */

nav{
background:#222;
position:sticky;
top:0;
z-index:1000;
}

.nav-container{
max-width:1200px;
margin:auto;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.nav-container a{
color:white;
padding:15px 25px;
text-decoration:none;
font-weight:bold;
font-size:14px;
text-transform:uppercase;
}

.nav-container a:hover{
background:var(--primary);
color:#000;
}

/* ===== Search ===== */

.search-wrapper{
background:#fff;
padding:30px 20px;
text-align:center;
border-bottom:1px solid #ddd;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.search-box-container{
max-width:700px;
margin:auto;
position:relative;
}

.top-search-input{
width:100%;
padding:15px 25px;
border:2px solid var(--primary);
border-radius:50px;
font-size:18px;
outline:none;
}

#search-status{
margin-top:15px;
font-weight:bold;
color:var(--primary);
display:none;
}

/* ===== Layout ===== */

.wrapper{
max-width:1200px;
margin:30px auto;
display:grid;
grid-template-columns:1fr 350px;
gap:30px;
padding:0 20px;
}

.blog-feed{
display:flex;
flex-direction:column;
gap:40px;
}

/* ===== Post ===== */

.post{
background:var(--white);
border:1px solid #ddd;
border-radius:8px;
overflow:hidden;
display:none;
position:relative;
transition:0.3s;
}

.post-image-container{
position:relative;
width:100%;
aspect-ratio:16/9;
background:#000;
overflow:hidden;
}

/* ===== IMAGE FIX ===== */

.post-img{
width:100%;
height:100%;
object-fit:contain;
background:#000;
display:block;
}

/* ===== Badges ===== */

.live-badge{
position:absolute;
top:10px;
left:10px;
background:red;
color:#fff;
padding:5px 12px;
font-weight:bold;
font-size:12px;
border-radius:4px;
animation:blink 1s infinite;
z-index:7;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

.viewer-counter{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.6);
color:#fff;
padding:4px 10px;
font-size:12px;
border-radius:4px;
font-weight:bold;
z-index:7;
}

/* ===== Play Button ===== */

.play-btn-container{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:5;
}

.play-btn-container i{
font-size:70px;
color:red;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

.loader{
position:absolute;
width:50px;
height:50px;
border:6px solid #eee;
border-top:6px solid red;
border-radius:50%;
display:none;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* ===== Post Text ===== */

.post-body{
padding:20px 30px;
}

.post-title{
font-size:24px;
font-weight:700;
color:#111;
text-decoration:none;
display:block;
margin-bottom:10px;
}

.post-desc{
margin-bottom:10px;
}

.btn-link{
display:inline-block;
background:var(--primary);
color:#000;
padding:10px 25px;
text-decoration:none;
font-weight:800;
border-radius:4px;
}

/* ===== Load More ===== */

.load-more-container{
text-align:center;
margin-top:40px;
margin-bottom:40px;
}

#loadMoreBtn{
background:#222;
color:white;
padding:15px 50px;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:50px;
font-size:16px;
transition:0.3s;
}

#loadMoreBtn:hover{
background:var(--primary);
color:#000;
}

/* ===== Sidebar ===== */

.sidebar{
display:flex;
flex-direction:column;
gap:30px;
}

.widget{
background:var(--white);
padding:25px;
border:1px solid #ddd;
border-radius:8px;
}

.widget-title{
font-size:18px;
font-weight:700;
border-bottom:2px solid #111;
padding-bottom:10px;
margin-bottom:20px;
text-transform:uppercase;
}

/* ===== Footer ===== */

footer{
background:#111;
color:#888;
padding:60px 0;
text-align:center;
}

/* ===== RESPONSIVE FIX ===== */

@media(max-width:1100px){

.wrapper{
grid-template-columns:1fr;
}

.sidebar{
order:2;
}

}

@media(max-width:600px){

.site-title{
font-size:28px;
}

.post-title{
font-size:20px;
}

.post-body{
padding:15px;
}

.nav-container a{
padding:12px;
font-size:12px;
}

}

</style>
</head>
<body>
